<div class="container">
    <div class="card">
        <h2 class="page-title">📋 Assign New Task</h2>

        <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form"
            (keydown.enter)="$event.preventDefault()">
            <!-- Employee Select -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Select Employee</mat-label>
                <mat-select formControlName="employeeId">
                    <mat-option *ngFor="let emp of employees" [value]="emp.id">
                        {{ emp.name }}
                    </mat-option>
                </mat-select>
                <mat-error *ngIf="taskForm.get('employeeId')?.hasError('required')">
                    Employee is required
                </mat-error>
            </mat-form-field>

            <!-- Target Date -->
            <div class="datetime-group">
                <mat-form-field appearance="outline" class="half-width">
                    <mat-label>Target Date</mat-label>
                    <input matInput [matDatepicker]="picker" formControlName="targetDate" [min]="minDate"
                        (dateChange)="updateDateTime()" />
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                    <mat-error *ngIf="taskForm.get('targetDate')?.hasError('required')">
                        Target Date is required
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="half-width">
                    <mat-label>Target Time</mat-label>
                    <input matInput [ngxMatTimepicker]="timePicker" readonly formControlName="targetTime"
                        placeholder="Select time" />
                    <ngx-mat-timepicker #timePicker [format]="12"></ngx-mat-timepicker>
                    <mat-icon matSuffix>access_time</mat-icon>
                    <mat-error *ngIf="taskForm.get('targetTime')?.hasError('required')">
                        Target Time is required
                    </mat-error>
                </mat-form-field>
            </div>

            <!-- Task Title -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Task Title</mat-label>
                <input matInput formControlName="task" />
                <mat-error *ngIf="taskForm.get('task')?.hasError('required')">
                    Task Title is required
                </mat-error>
                <mat-error *ngIf="taskForm.get('task')?.hasError('minlength')">
                    Task Title must be at least 5 characters
                </mat-error>
            </mat-form-field>

            <!-- Description -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput rows="4" formControlName="description"></textarea>
                <mat-error *ngIf="taskForm.get('description')?.hasError('required')">
                    Description is required
                </mat-error>
            </mat-form-field>

            <!-- Submit Button -->
            <div class="actions">
                <button mat-raised-button color="primary" type="submit" class="submit-btn"
                    [disabled]="taskForm.invalid">
                    <mat-icon>add</mat-icon>
                    Assign Task
                </button>
            </div>
        </form>
    </div>
</div>
