<div class="emp-notice-wrapper" *ngIf="latestNotices.length > 0; else noNotices">
    <div class="header">
        <div class="title-section">
            <mat-icon class="notice-icon">notifications_active</mat-icon>
            <h3>Latest Notices</h3>
        </div>
        <!-- <a class="view-all" href="#" (click)="$event.preventDefault()">View All</a> -->
    </div>

    <div class="notice-list">
        <mat-card *ngFor="let n of latestNotices" class="notice-card" appearance="outlined">
            <div class="notice-header">
                <mat-icon>campaign</mat-icon>
                <span class="notice-date">{{ formatDateTime(n.createdAt) }}</span>
            </div>
            <div class="notice-body">
                <p>{{ n.description }}</p>
            </div>
        </mat-card>
    </div>
</div>

<ng-template #noNotices>
    <div class="no-data">
        <p>No recent notices available</p>
    </div>
</ng-template>
